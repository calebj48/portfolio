<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chopped Lettuce Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&family=Syne:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0b0b0b;
      --surface:    #111111;
      --surface-2:  #181818;
      --border:     #232323;
      --border-hi:  #3a3a3a;
      --text:       #e8e4dc;
      --muted:      #6b6660;
      --accent:     #c8f04e;
      --accent-dim: rgba(200,240,78,.12);
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;
      --font-ui:      'Syne', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      position: relative;
      z-index: 1;
      overflow-x: hidden;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,240,78,.055) 0%, transparent 70%);
      pointer-events: none;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 0;
      filter: blur(40px);
    }

    .wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    header {
      padding: 5rem 0 3.5rem;
      border-bottom: 1px solid var(--border);
    }

    .studio-meta {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: .6rem;
    }

    .studio-index {
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--accent);
      letter-spacing: .12em;
      text-transform: uppercase;
      position: relative;
      top: -2px;
    }

    .studio-name {
      font-family: var(--font-display);
      font-size: clamp(3.6rem, 10vw, 8rem);
      letter-spacing: .02em;
      line-height: .92;
      background: linear-gradient(135deg, var(--text) 60%, rgba(200,240,78,.55) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .studio-tagline {
      font-family: var(--font-mono);
      font-size: .82rem;
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: .04em;
      margin-top: 1.1rem;
      max-width: 420px;
    }

    .rule {
      display: inline-block;
      width: 30px;
      height: 2px;
      background: var(--accent);
      margin-right: .7rem;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .projects-section { padding: 3.5rem 0 6rem; }

    .section-label {
      font-family: var(--font-mono);
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    @media (max-width: 720px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 440px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: background 220ms ease;
      cursor: default;
    }

    /* ── Preview thumbnail ──────────────────────────────── */
    .card-preview {
      position: relative;
      height: 160px;
      overflow: hidden;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      transition: border-color 220ms ease;
    }

    /*
      The iframe is rendered at its natural size then scaled to 1/3.
      Setting CSS dimensions to 3x the container means after
      scale(0.3333) it fills the 160px preview area exactly.
    */
    .preview-frame {
      width: 300%;
      height: 480px;
      transform: scale(0.3333);
      transform-origin: 0 0;
      pointer-events: none;
      border: none;
      display: block;
    }

    /* Transparent layer so hovering the card doesn't interact with the iframe */
    .preview-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    /* Shown for placeholder # URLs */
    .preview-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .55rem;
      background:
        repeating-linear-gradient(
          -45deg,
          transparent 0px,
          transparent 6px,
          rgba(255,255,255,.018) 6px,
          rgba(255,255,255,.018) 7px
        ),
        var(--bg);
      transition: background 220ms ease;
    }

    .placeholder-icon { opacity: .2; }

    .placeholder-label {
      font-family: var(--font-mono);
      font-size: .58rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: .55;
    }

    .card-body {
      padding: 1.3rem 1.8rem 1.6rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-num {
      font-family: var(--font-mono);
      font-size: .6rem;
      color: var(--border-hi);
      letter-spacing: .1em;
      transition: color 220ms ease;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -.01em;
      line-height: 1.25;
      margin: .7rem 0 1rem;
      color: var(--text);
      flex: 1;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      font-family: var(--font-mono);
      font-size: .7rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: .45rem .9rem;
      background: transparent;
      align-self: flex-start;
      transition: color 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .card-btn svg {
      flex-shrink: 0;
      transition: transform 200ms ease;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity 220ms ease;
      pointer-events: none;
      z-index: 2;
    }

    .card:hover { background: var(--surface-2); }
    .card:hover::after { opacity: 1; }
    .card:hover .card-preview { border-bottom-color: rgba(200,240,78,.22); }
    .card:hover .preview-placeholder {
      background:
        repeating-linear-gradient(
          -45deg,
          transparent 0px,
          transparent 6px,
          rgba(200,240,78,.03) 6px,
          rgba(200,240,78,.03) 7px
        ),
        var(--bg);
    }
    .card:hover .card-num { color: var(--accent); }
    .card:hover .card-btn {
      color: var(--accent);
      border-color: rgba(200,240,78,.4);
      background: rgba(200,240,78,.06);
    }
    .card:hover .card-btn svg { transform: translate(2px, -2px); }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.8rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .footer-name {
      font-family: var(--font-mono);
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      margin: 0 .5rem;
      animation: pulse 2.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .35; transform: scale(.7); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .studio-name,
    .studio-tagline,
    .section-label,
    .grid { animation: fadeUp .55s cubic-bezier(.22,1,.36,1) both; }
    .studio-name    { animation-delay: .05s; }
    .studio-tagline { animation-delay: .15s; }
    .section-label  { animation-delay: .22s; }
    .grid           { animation-delay: .3s;  }
  </style>
</head>
<body>

  <div class="glow" aria-hidden="true"></div>

  <div class="wrapper">

    <header>
      <div class="studio-meta">
        <span class="studio-index">EST. MMXXV</span>
      </div>
      <h1 class="studio-name">Chopped Lettuce Studios</h1>
      <p class="studio-tagline">
        <span class="rule" aria-hidden="true"></span>
        Small tools. Weird ideas. Shipped anyway.
      </p>
    </header>

    <section class="projects-section" aria-label="Projects">
      <p class="section-label">Projects &mdash; <span id="project-count"></span></p>
      <div class="grid" id="grid" role="list"></div>
    </section>

    <footer>
      <span class="footer-name">Chopped Lettuce Studios</span>
      <span aria-hidden="true"><span class="footer-dot"></span></span>
    </footer>

  </div>

  <script>
    // To add or remove projects, edit this array.
    const projects = [
      { name: "Weebo Beebo",            url: "https://weebobeebo.vercel.app/" },
      { name: "Powerball Simulator",    url: "https://powerball-sim-p4hz.vercel.app/" },
      { name: "HR Complaint Form",      url: "https://beechenwinen.vercel.app/board" },
      { name: "Horse Racing Simulator", url: "https://thunderdowns.vercel.app/" },
      { name: "The Loading Bar",        url: "#" },
      { name: "The Stok Exchange",      url: "#" },
    ];

    const grid  = document.getElementById("grid");
    const count = document.getElementById("project-count");
    count.textContent = projects.length;

    projects.forEach((project, i) => {
      const card = document.createElement("article");
      card.setAttribute("role", "listitem");
      card.className = "card";

      const num = String(i + 1).padStart(2, "0");
      const isPlaceholder = !project.url || project.url === "#";

      const previewHTML = isPlaceholder
        ? `<div class="preview-placeholder">
            <svg class="placeholder-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="3" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M8 21h8M12 17v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span class="placeholder-label">Coming soon</span>
          </div>`
        : `<iframe
            class="preview-frame"
            src="${project.url}"
            title="${project.name} preview"
            loading="lazy"
            sandbox="allow-scripts allow-same-origin"
            scrolling="no"
          ></iframe>
          <div class="preview-overlay" aria-hidden="true"></div>`;

      card.innerHTML = `
        <div class="card-preview">${previewHTML}</div>
        <div class="card-body">
          <span class="card-num" aria-hidden="true">${num}</span>
          <h2 class="card-title">${project.name}</h2>
          <a
            class="card-btn"
            href="${project.url}"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Launch ${project.name}"
          >
            Launch
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
              <path d="M2 8L8 2M8 2H3.5M8 2V6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      `;

      grid.appendChild(card);
    });
  </script>
</body>
</html>
